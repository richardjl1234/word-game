version: '3.9'

services:
  # ==================== FastAPI ====================
  api:
    build: .
    container_name: wordgame-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://wordgame:wordgame@postgres:5432/wordgame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: wordgame-uploads
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ==================== Celery Worker ====================
  worker:
    build: .
    container_name: wordgame-worker
    environment:
      DATABASE_URL: postgresql://wordgame:wordgame@postgres:5432/wordgame
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: wordgame-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./app:/app/app
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ==================== Postgres ====================
  postgres:
    image: postgres:16-alpine
    container_name: wordgame-postgres
    environment:
      POSTGRES_USER: wordgame
      POSTGRES_PASSWORD: wordgame
      POSTGRES_DB: wordgame
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordgame"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: wordgame-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== MinIO (S3-compatible) ====================
  minio:
    image: minio/minio:latest
    container_name: wordgame-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # 控制台
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: